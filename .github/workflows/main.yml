name: Laravel CI/CD Pipeline

on:
  push:
    branches: main  

jobs:
  
  continuous-integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Company-Attendance-Management-system

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

  
    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        

    - name: Install Node Dependencies & Build
      run: |
        npm ci
        npm run build --if-present

    
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, dom, curl, libxml, zip

    - name: Install PHP Dependencies (Composer)
      run: |
        php -r "file_exists('.env') || copy('.env.example', '.env');"
        composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
        php artisan key:generate --skip

    - name: Run Automated Tests
      run: |
        npm test --if-present
        # vendor/bin/phpunit --if-present  # Laravel unit test ရှိက run ရန်

  
  continuous-deployment:
    needs: continuous-integration 
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' 

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    
    - name: Deploy to Production Server via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}        
        username: ${{ secrets.SERVER_USERNAME }} 
        key: ${{ secrets.SERVER_SSH_KEY }}       
        source: "."
        target: "/var/www/company-attendance-system" 

    
    - name: Execute Remote SSH Commands
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/company-attendance-system
          # Node.js app ဖြစ်ပါက pm2 သို့မဟုတ် npm start ပြန်လုပ်ရန်:
          # npm install --production
          # pm2 restart attendance-app || pm2 start server.js --name attendance-app
          
          # Laravel app ဖြစ်ပါက commands များ run ရန်:
          # composer install --no-dev --optimize-autoloader
          # php artisan migrate --force
          # php artisan config:cache